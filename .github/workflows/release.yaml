# Release workflow for a PUBLIC fylr plugin (canonical template:
# fylr-build-plugin/templates/release-public.yaml). A manager publishes a
# release on the GitHub release page; this builds the plugin zip and attaches
# it — fylr installs from releases/latest/download/<repo>.zip.
name: Release

on:
  release:
    types:
      - published
      - edited

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install CoffeeScript
        run: sudo npm install -g coffeescript@1.12.7

      - name: Install golang
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          # a plugin repo has no go.mod for the dependency cache to key on
          cache: false

      - name: Build and package
        run: make zip
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          ZIP_NAME: ${{ github.event.repository.name }}.zip

      - name: Attach plugin zip to the release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/${{ github.event.repository.name }}.zip
